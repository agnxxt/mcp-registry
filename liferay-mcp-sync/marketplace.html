<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Marketplace - AgentNXXT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }

    /* Header */
    .header { background: linear-gradient(135deg, #1a1f36 0%, #0d1117 100%); border-bottom: 1px solid #21262d; padding: 24px 32px; }
    .header-content { max-width: 1400px; margin: 0 auto; }
    .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: #8b949e; margin-top: 4px; font-size: 14px; }
    .stats-bar { display: flex; gap: 24px; margin-top: 16px; }
    .stat { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 20px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #58a6ff; }
    .stat-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Search & Filters */
    .controls { max-width: 1400px; margin: 24px auto; padding: 0 32px; display: flex; gap: 12px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 300px; position: relative; }
    .search-box input { width: 100%; padding: 12px 16px 12px 40px; background: #161b22; border: 1px solid #21262d; border-radius: 8px; color: #e1e4e8; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-box input:focus { border-color: #58a6ff; }
    .search-box::before { content: '\1F50D'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; }
    .filter-btn { padding: 10px 16px; background: #161b22; border: 1px solid #21262d; border-radius: 8px; color: #8b949e; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: #1f2937; border-color: #58a6ff; color: #58a6ff; }

    /* Grid */
    .grid { max-width: 1400px; margin: 0 auto; padding: 0 32px 48px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

    /* Card */
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; position: relative; overflow: hidden; }
    .card:hover { border-color: #30363d; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-size: 16px; font-weight: 600; color: #e1e4e8; }
    .card-type { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .type-Framework { background: #1f3a5f; color: #58a6ff; }
    .type-Agent { background: #3b1f5f; color: #bc8cff; }
    .type-Chatbot { background: #1f5f3a; color: #56d364; }
    .type-LLM { background: #5f3a1f; color: #f0883e; }
    .type-Text-to-Image { background: #5f1f4a; color: #f778ba; }
    .type-Text-to-Speech { background: #1f5f5f; color: #56d3d3; }
    .type-Search { background: #3a5f1f; color: #a6e22e; }
    .type-PDF-Tool { background: #5f1f1f; color: #f85149; }
    .type-Dataset-Tool { background: #4a3a1f; color: #d29922; }
    .type-RAG { background: #2a1f5f; color: #8b8cff; }
    .type-MLOps { background: #1f4a3a; color: #3fb950; }
    .type-Headless-CMS { background: #3a1f4a; color: #d2a8ff; }
    .type-Low-Code { background: #1f3a4a; color: #79c0ff; }
    .type-Data-Integration { background: #4a4a1f; color: #e3b341; }
    .type-Code-Assistant { background: #1f4a1f; color: #7ee787; }
    .type-Observability { background: #4a1f3a; color: #ff7b72; }
    .card-desc { font-size: 13px; color: #8b949e; line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; gap: 16px; font-size: 12px; color: #8b949e; margin-bottom: 12px; }
    .card-meta span { display: flex; align-items: center; gap: 4px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 11px; padding: 2px 8px; background: #1f2937; border-radius: 10px; color: #8b949e; }
    .card-category { font-size: 11px; color: #58a6ff; margin-top: 10px; padding-top: 10px; border-top: 1px solid #21262d; }
    .card-links { display: flex; gap: 8px; margin-top: 12px; }
    .card-link { font-size: 12px; padding: 4px 12px; border-radius: 6px; text-decoration: none; transition: all 0.2s; }
    .card-link.github { background: #21262d; color: #e1e4e8; }
    .card-link.github:hover { background: #30363d; }
    .card-link.website { background: #1f3a5f; color: #58a6ff; }
    .card-link.website:hover { background: #264f78; }

    /* Category sidebar */
    .layout { max-width: 1400px; margin: 0 auto; padding: 0 32px; display: flex; gap: 24px; }
    .sidebar { width: 220px; flex-shrink: 0; }
    .sidebar h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 12px; }
    .sidebar-item { padding: 8px 12px; font-size: 13px; color: #8b949e; cursor: pointer; border-radius: 6px; margin-bottom: 2px; transition: all 0.15s; display: flex; justify-content: space-between; }
    .sidebar-item:hover { background: #1f2937; color: #e1e4e8; }
    .sidebar-item.active { background: #1f3a5f; color: #58a6ff; }
    .sidebar-count { font-size: 11px; background: #21262d; padding: 1px 6px; border-radius: 10px; }
    .main-content { flex: 1; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: #8b949e; }
    .loading .spinner { width: 40px; height: 40px; border: 3px solid #21262d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 60px; color: #8b949e; }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; display: flex; overflow-x: auto; gap: 8px; }
      .sidebar h3 { display: none; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>AI Marketplace</h1>
      <p>Discover, compare, and deploy open-source AI tools, frameworks, and models</p>
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="totalTools">-</div>
          <div class="stat-label">AI Tools</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalCategories">-</div>
          <div class="stat-label">Categories</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalStars">-</div>
          <div class="stat-label">Total GitHub Stars</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search AI tools, frameworks, agents...">
    </div>
    <button class="filter-btn active" data-sort="stars">Top Rated</button>
    <button class="filter-btn" data-sort="name">A-Z</button>
    <button class="filter-btn" data-sort="recent">Recent</button>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar">
      <h3>Categories</h3>
      <div class="sidebar-item active" data-type="all">All Tools <span class="sidebar-count" id="countAll">0</span></div>
    </div>
    <div class="main-content">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading AI Catalog...</p>
      </div>
      <div class="grid" id="grid" style="display:none;"></div>
      <div class="empty" id="empty" style="display:none;">No tools found matching your search.</div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin || 'http://51.75.251.56:8080';
    let allTools = [];
    let currentType = 'all';
    let currentSort = 'stars';

    async function fetchTools() {
      const tools = [];
      let page = 1;
      let hasMore = true;

      while (hasMore) {
        try {
          const resp = await fetch(`${API_BASE}/o/c/aitools?pageSize=100&page=${page}`, {
            headers: { 'Accept': 'application/json' },
            credentials: 'include'
          });
          const data = await resp.json();
          if (data.items && data.items.length > 0) {
            tools.push(...data.items);
            page++;
            hasMore = data.items.length === 100;
          } else {
            hasMore = false;
          }
        } catch (e) {
          console.error('Fetch error:', e);
          hasMore = false;
        }
      }
      return tools;
    }

    function renderSidebar(tools) {
      const types = {};
      tools.forEach(t => {
        const type = t.toolType || 'Other';
        types[type] = (types[type] || 0) + 1;
      });

      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '<h3>Categories</h3>';
      sidebar.innerHTML += `<div class="sidebar-item active" data-type="all">All Tools <span class="sidebar-count">${tools.length}</span></div>`;

      Object.entries(types)
        .sort((a, b) => b[1] - a[1])
        .forEach(([type, count]) => {
          sidebar.innerHTML += `<div class="sidebar-item" data-type="${type}">${type.replace(/-/g, ' ')} <span class="sidebar-count">${count}</span></div>`;
        });

      sidebar.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          sidebar.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          currentType = item.dataset.type;
          renderGrid();
        });
      });

      document.getElementById('countAll').textContent = tools.length;
    }

    function renderGrid() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allTools.filter(t => {
        if (currentType !== 'all' && t.toolType !== currentType) return false;
        if (query) {
          const searchable = `${t.toolName} ${t.toolDescription} ${t.toolTags} ${t.gartnerCategory} ${t.toolType}`.toLowerCase();
          return searchable.includes(query);
        }
        return true;
      });

      // Sort
      if (currentSort === 'stars') {
        filtered.sort((a, b) => (b.githubStars || 0) - (a.githubStars || 0));
      } else if (currentSort === 'name') {
        filtered.sort((a, b) => (a.toolName || '').localeCompare(b.toolName || ''));
      } else if (currentSort === 'recent') {
        filtered.sort((a, b) => new Date(b.dateCreated || 0) - new Date(a.dateCreated || 0));
      }

      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');

      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.style.display = 'grid';

      grid.innerHTML = filtered.map(t => {
        const tags = (t.toolTags || '').split(',').filter(tag => tag.trim()).slice(0, 4);
        const stars = t.githubStars ? t.githubStars.toLocaleString() : '0';
        const typeClass = `type-${(t.toolType || 'Other').replace(/\s/g, '-')}`;

        return `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${t.toolName || 'Unknown'}</div>
              <span class="card-type ${typeClass}">${t.toolType || 'Tool'}</span>
            </div>
            <div class="card-desc">${t.toolDescription || 'No description available.'}</div>
            <div class="card-meta">
              <span>\u2B50 ${stars}</span>
              <span>\uD83D\uDCBB ${t.primaryLanguage || 'N/A'}</span>
              <span>\uD83D\uDCC4 ${t.licenseName || 'N/A'}</span>
            </div>
            <div class="card-tags">
              ${tags.map(tag => `<span class="tag">${tag.trim()}</span>`).join('')}
            </div>
            <div class="card-category">\uD83C\uDFAF ${t.gartnerCategory || 'Uncategorized'}</div>
            <div class="card-links">
              ${t.githubUrl ? `<a href="${t.githubUrl}" target="_blank" class="card-link github">\uD83D\uDD17 GitHub</a>` : ''}
              ${t.websiteUrl ? `<a href="${t.websiteUrl}" target="_blank" class="card-link website">\uD83C\uDF10 Website</a>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function updateStats(tools) {
      document.getElementById('totalTools').textContent = tools.length;
      const types = new Set(tools.map(t => t.toolType));
      document.getElementById('totalCategories').textContent = types.size;
      const totalStars = tools.reduce((sum, t) => sum + (t.githubStars || 0), 0);
      document.getElementById('totalStars').textContent = totalStars > 1000000
        ? (totalStars / 1000000).toFixed(1) + 'M'
        : totalStars > 1000
        ? (totalStars / 1000).toFixed(0) + 'K'
        : totalStars;
    }

    // Init
    (async () => {
      allTools = await fetchTools();
      document.getElementById('loading').style.display = 'none';
      renderSidebar(allTools);
      updateStats(allTools);
      renderGrid();

      // Search
      document.getElementById('searchInput').addEventListener('input', renderGrid);

      // Sort buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSort = btn.dataset.sort;
          renderGrid();
        });
      });
    })();
  </script>
</body>
</html>
