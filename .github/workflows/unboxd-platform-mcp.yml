name: Unboxd Platform MCP Servers

on:
  push:
    branches: ["main"]
    paths:
      - "microcloud-mcp-server/**"
      - "lxc-mcp-server/**"
      - "ansible-mcp-server/**"
      - "terraform-mcp-server/**"
      - "gcloud-run-mcp-server/**"
      - ".github/workflows/unboxd-platform-mcp.yml"
      - ".github/workflows/docker-push.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "microcloud-mcp-server/**"
      - "lxc-mcp-server/**"
      - "ansible-mcp-server/**"
      - "terraform-mcp-server/**"
      - "gcloud-run-mcp-server/**"
      - ".github/workflows/unboxd-platform-mcp.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - microcloud-mcp-server
          - lxc-mcp-server
          - ansible-mcp-server
          - terraform-mcp-server
          - gcloud-run-mcp-server
        node-version: [22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: ${{ matrix.server }}
        run: npm install

      - name: Build TypeScript server
        working-directory: ${{ matrix.server }}
        run: npm run build

      - name: Build Docker image
        run: docker build -t ${{ matrix.server }}:ci ./${{ matrix.server }}

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - microcloud-mcp-server
          - lxc-mcp-server
          - ansible-mcp-server
          - terraform-mcp-server
          - gcloud-run-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.server }}
          file: ${{ matrix.server }}/Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}:latest
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}:${{ github.sha }}
